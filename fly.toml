app = "campnw"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "campnw_data"
  destination = "/app/data"

[env]
  # RIDB_API_KEY set via `fly secrets set`
