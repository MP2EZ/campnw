<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Campable{% endblock %}</title>
  <meta name="description" content="{% block description %}Find and monitor campsite availability across Washington, Oregon, Idaho, Montana, Wyoming, and Northern California.{% endblock %}">
  {% block meta %}{% endblock %}
  <link rel="canonical" href="{{ canonical_url }}">
  <meta property="og:title" content="{% block og_title %}{{ self.title() }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ self.description() }}{% endblock %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ canonical_url }}">
  <meta property="og:image" content="{{ base_url }}/og-default.png">
  <meta property="og:site_name" content="Campable">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/seo-static/seo.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
  {% block jsonld %}{% endblock %}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="seo-header">
    <a href="/" class="seo-header__brand">campable</a>
    <nav class="seo-header__nav" aria-label="Main">
      <a href="/campgrounds">Campgrounds</a>
      <a href="/">Search</a>
      <a href="/map">Map</a>
    </nav>
  </header>

  <main id="main" class="seo-page">
    {% block content %}{% endblock %}
  </main>

  <footer class="seo-footer">
    <p>
      <a href="/campgrounds">All campgrounds</a> &middot;
      <a href="/">Search availability</a> &middot;
      <a href="/map">Map view</a>
    </p>
    <p>&copy; {{ current_year }} Campable</p>
  </footer>
</body>
</html>
