<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Option B: Window/Ridgeline — rounded square with PNW treeline -->
  <!-- Brand green background, cream silhouette, reads at 16px as a framed landscape -->
  <defs>
    <style>
      .frame-fill { fill: #2d5016; }
      .scene-fill { fill: #f5f5f0; }
      .scene-mid { fill: #4a8028; }
    </style>
  </defs>
  <!-- Rounded square frame -->
  <rect class="frame-fill" x="32" y="32" width="448" height="448" rx="64"/>
  <!-- Sky/background area -->
  <rect class="scene-fill" x="64" y="64" width="384" height="384" rx="32"/>
  <!-- Mountain ridgeline -->
  <path class="frame-fill" d="
    M64 380
    L140 240
    L180 290
    L240 180
    L310 300
    L350 250
    L448 380
    L448 448
    L64 448
    Z
  "/>
  <!-- Treeline silhouette (foreground) -->
  <path class="scene-mid" d="
    M64 400
    L90 350 L100 380
    L120 330 L135 370
    L160 310 L175 360
    L200 320 L210 360
    L240 300 L255 350
    L275 310 L290 355
    L310 320 L325 360
    L350 330 L365 365
    L390 340 L405 370
    L420 350 L440 380
    L448 390
    L448 448
    L64 448
    Z
  "/>
</svg>
