<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- campable logo mark — pin drop with layered Pacific Northwest evergreen -->
  <defs>
    <style>
      .pin { fill: #2d5016; }
      .tree { fill: #f5f5f0; }
    </style>
  </defs>

  <!-- Pin body — smooth teardrop with cubic beziers -->
  <path class="pin" d="
    M256 476
    C256 476 88 296 88 196
    C88 103 163 28 256 28
    C349 28 424 103 424 196
    C424 296 256 476 256 476Z
  "/>

  <!-- Three-tier evergreen tree — layered triangles with slight overlap -->
  <!-- Top tier (smallest) -->
  <path class="tree" d="
    M256 92
    L296 164 L276 164
    L316 232 L196 232
    L236 164 L216 164 Z
  "/>
  <!-- Bottom tier (widest) -->
  <path class="tree" d="
    M196 222
    L336 222
    L358 290
    L154 290
    Z
  "/>

  <!-- Trunk — rounded rectangle -->
  <rect class="tree" x="240" y="282" width="32" height="42" rx="4"/>
</svg>
