<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" shape-rendering="crispEdges">
  <style>
    .bg { fill: #f5f5f0; }
    .tent { fill: #f5f5f0; stroke: #2d5016; }
    .flap { fill: #2d5016; }
    .seam { fill: #f5f5f0; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #171714; }
      .tent { fill: #f5f5f0; stroke: #f5f5f0; }
      .flap { fill: #2d5016; }
      .seam { fill: #f5f5f0; }
    }
  </style>
  <rect class="bg" width="24" height="24" rx="4.5"/>
  <polygon class="tent" points="5,5 19,5 12,19" stroke-width="1"/>
  <polygon class="flap" points="14,5 19,5 12,19"/>
  <polygon class="seam" points="13,5 14,5 12,19"/>
</svg>